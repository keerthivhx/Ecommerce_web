<!DOCTYPE html>
<html>
<head>
    <title>My Store</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-dark p-3">
    <div class="container">
        <a class="navbar-brand" href="/">My Store 🛒</a>

        <div>
            <a href="/cart/" class="btn btn-warning">Cart 🛒</a>
            <a href="/register/" class="btn btn-light">Register</a>
            <a href="/login/" class="btn btn-success">Login</a>
            <a href="/logout/" class="btn btn-danger">Logout</a>
        </div>
    </div>
</nav>

<!-- Products Section -->
<div class="container mt-4">

    <h1 class="text-center mb-4">Products 🛒</h1>

    <div class="row">
        {% for product in products %}
        <div class="col-md-4">
            <div class="card shadow p-3 mb-4">

                {% if product.image %}
                    <img src="{{ product.image.url }}" class="card-img-top" height="200">
                {% endif %}

                <div class="card-body text-center">
                    <h5 class="card-title">{{ product.name }}</h5>
                    <p class="card-text">₹{{ product.price }}</p>

                    <a href="/product/{{ product.id }}/" class="btn btn-primary">
                        View Details
                    </a>
                </div>
                <footer class="bg-dark text-white text-center p-3 mt-4">
    <p>© 2026 My E-commerce Website</p>
</footer>

            </div>
        </div>
        {% endfor %}
    </div>

</div>
<a href="/add-to-cart/{{ product.id }}/" class="btn btn-success mt-2">
    Add to Cart 🛒
</a>

</body>
</html>
