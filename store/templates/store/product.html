<!DOCTYPE html>
<html>
<head>
    <title>Product Details</title>
</head>
<body>

<h1>{{ product.name }}</h1>

{% if product.image %}
    <img src="{{ product.image.url }}" width="200">
{% endif %}

<p><b>Price:</b> ₹{{ product.price }}</p>

<p>{{ product.description }}</p>

<a href="/">⬅ Back to Home</a>

</body>
</html>
<a href="/add-to-cart/{{ product.id }}/">
    <button>Add to Cart 🛒</button>
</a>
